name: Function Deploy

on:
  push:
    branches: [main]
    paths:
      - 'func/**'
      - '.github/workflows/func-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: function-production
  cancel-in-progress: false

jobs:
  deploy-function:
    name: Deploy Azure Function
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build function solution
        run: dotnet build func/Usmga.Func.sln --configuration Release

      - name: Test function solution
        run: dotnet test func/Usmga.Func.sln --configuration Release --no-build

      - name: Publish function app
        run: dotnet publish func/Usmga.FunctionApp/Usmga.FunctionApp.csproj --configuration Release --output ./publish

      - name: Deploy Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
